<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Martoo Tech Works - Administrator Dashboard. Manage users, courses, enrollments, and platform content.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Martoo Tech Works">
    
    <title>Admin Dashboard - Martoo Tech Works</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS - FIXED PATHS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Favicon - FIXED PATH -->
    <link rel="icon" type="image/png" href="Images/martoo_tech_logo.png">
    
    <style>
        /* ===== DASHBOARD SPECIFIC STYLES ===== */
        :root {
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 80px;
            --header-height: 70px;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: var(--primary-deeper);
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .dashboard-sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary-deeper) 100%);
            border-right: 1px solid rgba(0, 123, 255, 0.1);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: width var(--transition-normal);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .dashboard-sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo img {
            height: 40px;
            width: auto;
        }

        .sidebar-logo span {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--neutral-100);
            letter-spacing: 1px;
        }

        .sidebar-logo .tech {
            color: var(--accent-blue);
        }

        .sidebar-toggle {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: var(--primary-navy);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--neutral-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .sidebar-toggle:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* Admin Profile */
        .admin-profile {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-avatar {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-full);
            background: var(--gradient-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .admin-info {
            flex: 1;
            overflow: hidden;
        }

        .admin-name {
            font-weight: 700;
            color: var(--neutral-100);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .admin-role {
            font-size: 12px;
            color: var(--accent-blue);
            background: rgba(0, 123, 255, 0.1);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            display: inline-block;
        }

        /* Navigation Menu */
        .sidebar-nav {
            flex: 1;
            padding: 24px 16px;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            padding: 0 12px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neutral-400);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-items {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--neutral-300);
            transition: all var(--transition-fast);
            position: relative;
        }

        .nav-link i {
            width: 20px;
            font-size: 18px;
            text-align: center;
        }

        .nav-link:hover {
            background: rgba(0, 123, 255, 0.1);
            color: var(--accent-blue);
        }

        .nav-link.active {
            background: var(--accent-blue);
            color: white;
        }

        .nav-link.active i {
            color: white;
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }

        .nav-link.active .nav-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 24px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            width: 100%;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            border-radius: var(--radius-md);
            color: #ff6b7b;
            font-weight: 600;
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.3);
            color: #ff8a9a;
        }

        .logout-btn i {
            font-size: 18px;
        }

        /* ===== MAIN CONTENT ===== */
        .dashboard-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left var(--transition-normal);
            min-height: 100vh;
            background: var(--primary-deeper);
            position: relative;
        }

        .dashboard-main.expanded {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* Top Header */
        .dashboard-header {
            height: var(--header-height);
            background: var(--gradient-card);
            border-bottom: 1px solid rgba(0, 123, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .header-search {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .header-search i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-400);
            font-size: 16px;
        }

        .header-search input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            color: var(--neutral-100);
            font-size: 14px;
            transition: all var(--transition-fast);
        }

        .header-search input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--primary-midnight);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-notification {
            position: relative;
        }

        .notification-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--neutral-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }

        .notification-btn:hover {
            background: var(--primary-navy);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: var(--danger);
            color: white;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary-dark);
        }

        .header-date {
            color: var(--neutral-300);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--primary-deep);
            border-radius: var(--radius-full);
        }

        .header-date i {
            color: var(--accent-blue);
        }

        /* ===== DASHBOARD CONTENT ===== */
        .dashboard-content {
            padding: 32px;
        }

        /* Welcome Banner */
        .welcome-banner {
            background: var(--gradient-navy);
            border: 1px solid rgba(0, 123, 255, 0.2);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .welcome-content h2 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--neutral-100);
        }

        .welcome-content p {
            color: var(--neutral-300);
            margin-bottom: 0;
            font-size: 16px;
        }

        .welcome-stats {
            display: flex;
            gap: 32px;
        }

        .welcome-stat {
            text-align: center;
        }

        .welcome-stat .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .welcome-stat .stat-label {
            font-size: 13px;
            color: var(--neutral-400);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--gradient-card);
            border: 1px solid rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            transition: all var(--transition-normal);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 123, 255, 0.3);
            box-shadow: var(--shadow-lg);
        }

        .stat-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-400);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--neutral-100);
            margin-bottom: 4px;
            line-height: 1;
        }

        .stat-trend {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-trend.positive {
            color: var(--success);
        }

        .stat-trend.negative {
            color: var(--danger);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-blue);
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .chart-header h3 {
            font-size: 18px;
            margin-bottom: 0;
            color: var(--neutral-100);
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            padding: 6px 12px;
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            color: var(--neutral-300);
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .chart-btn:hover,
        .chart-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        /* Tables */
        .table-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .table-header h3 {
            font-size: 18px;
            margin-bottom: 0;
            color: var(--neutral-100);
        }

        .table-actions {
            display: flex;
            gap: 12px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--neutral-400);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px;
            color: var(--neutral-200);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(0, 123, 255, 0.02);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--primary-navy);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-weight: 700;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: var(--neutral-100);
            margin-bottom: 2px;
        }

        .user-email {
            font-size: 12px;
            color: var(--neutral-400);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .status-confirmed {
            background: rgba(0, 123, 255, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(0, 123, 255, 0.2);
        }

        .status-cancelled {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
            border: 1px solid rgba(220, 53, 69, 0.2);
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--neutral-300);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .action-btn:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .action-btn.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .quick-action-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .quick-action-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            background: linear-gradient(145deg, var(--primary-navy) 0%, var(--primary-midnight) 100%);
        }

        .quick-action-icon {
            width: 70px;
            height: 70px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-blue);
            margin: 0 auto 16px;
            transition: all var(--transition-normal);
        }

        .quick-action-card:hover .quick-action-icon {
            background: var(--accent-blue);
            color: white;
            transform: scale(1.1);
        }

        .quick-action-title {
            font-weight: 700;
            color: var(--neutral-100);
            margin-bottom: 8px;
        }

        .quick-action-desc {
            font-size: 13px;
            color: var(--neutral-400);
            margin-bottom: 0;
        }

        /* Loading States */
        .loading-skeleton {
            background: linear-gradient(90deg, 
                var(--primary-navy) 25%, 
                var(--primary-midnight) 50%, 
                var(--primary-navy) 75%
            );
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== MOBILE HAMBURGER MENU STYLES - ADDED ===== */
        @media (max-width: 768px) {
            .dashboard-sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
                transition: transform 0.3s ease;
            }
            
            .dashboard-sidebar.active {
                transform: translateX(0);
            }
            
            .dashboard-main {
                margin-left: 0 !important;
            }
            
            /* Mobile menu toggle button */
            .mobile-menu-toggle {
                display: flex !important;
                flex-direction: column;
                justify-content: space-between;
                width: 30px;
                height: 21px;
                background: transparent;
                border: none;
                cursor: pointer;
                padding: 0;
                margin-right: 16px;
                z-index: 1001;
            }
            
            .mobile-menu-toggle span {
                width: 100%;
                height: 3px;
                background: var(--neutral-100);
                transition: all 0.3s ease;
                border-radius: 3px;
            }
            
            .mobile-menu-toggle.active span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }
            
            .mobile-menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }
            
            .mobile-menu-toggle.active span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }
            
            body.menu-open {
                overflow: hidden;
            }
            
            .header-actions {
                gap: 8px;
            }
            
            .header-date span {
                display: none;
            }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 992px) {
            .welcome-banner {
                flex-direction: column;
                text-align: center;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-content {
                padding: 24px 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                grid-template-columns: 1fr;
            }
            
            .welcome-stats {
                flex-direction: column;
                gap: 16px;
            }
            
            .header-date span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- ============================================ -->
        <!-- 🛡️ SIDEBAR - ADMIN NAVIGATION              -->
        <!-- ============================================ -->
        <aside class="dashboard-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="Images/martoo_tech_logo.png" alt="Martoo Tech Works">
                    <span>MARTOO<span class="tech">TECH</span></span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <div class="admin-profile" id="adminProfile">
                <div class="admin-avatar">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="admin-info">
                    <div class="admin-name" id="adminName">Loading...</div>
                    <span class="admin-role">Administrator</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <!-- Main Navigation -->
                <div class="nav-section">
                    <div class="nav-section-title">MAIN</div>
                    <ul class="nav-items">
                        <li class="nav-item">
                            <a href="#dashboard" class="nav-link active" data-section="dashboard">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#users" class="nav-link" data-section="users">
                                <i class="fas fa-users"></i>
                                <span>Users</span>
                                <span class="nav-badge" id="userCountBadge">0</span>
                            </a>
                        </li>

        (async function checkAuth() {
            try {
                console.log('🔍 Checking authentication...');
                
                // ✅ Check localStorage FIRST (admin should be here)
                const token = localStorage.getItem('martoo_token');
                const userData = localStorage.getItem('martoo_user');
                
                console.log('📦 Token in localStorage:', !!token);
                console.log('📦 User data in localStorage:', !!userData);
                
                // If not in localStorage, check sessionStorage as fallback
                const sessionToken = sessionStorage.getItem('martoo_token');
                const sessionUser = sessionStorage.getItem('martoo_user');
                
                if (!token && !sessionToken) {
                    console.log('❌ No token found - redirecting to login');
                    window.location.href = 'login.html';
                    return;
                }

                // Use whichever token exists
                const activeToken = token || sessionToken;
                const activeUser = userData || sessionUser;
                
                if (!activeUser) {
                    console.log('❌ No user data found - redirecting to login');
                    window.location.href = 'login.html';
                    return;
                }

                const user = JSON.parse(activeUser);
                console.log('👤 User:', user.email, 'Role:', user.role);
                
                // Verify admin role
                if (user.role !== 'admin') {
                    console.log('❌ Not an admin - redirecting to user dashboard');
                    window.location.href = 'user_dashboard.html';
                    return;
                }

                // Set admin name
                document.getElementById('adminName').textContent = user.name || 'Administrator';
                
                // Initialize dashboard
                initDashboard();
                
            } catch (error) {
                console.error('❌ Auth check failed:', error);
                window.location.href = 'login.html';
            }
        })();

        // ===================================================================
        // 📱 MOBILE MENU - FIXED
        // ===================================================================
        function initMobileMenu() {
            const mobileToggle = document.getElementById('mobileMenuToggle');
            const sidebar = document.getElementById('sidebar');
            
            if (!mobileToggle || !sidebar) {
                console.log('⚠️ Mobile menu elements not found');
                return;
            }
            
            console.log('📱 Initializing mobile menu');
            
            // Show on mobile only
            if (window.innerWidth <= 768) {
                mobileToggle.style.display = 'flex';
            } else {
                mobileToggle.style.display = 'none';
            }
            
            // Handle resize
            window.addEventListener('resize', function() {
                if (window.innerWidth <= 768) {
                    mobileToggle.style.display = 'flex';
                } else {
                    mobileToggle.style.display = 'none';
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }
            });
            
            // Toggle menu on click
            mobileToggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                this.classList.toggle('active');
                sidebar.classList.toggle('active');
                document.body.classList.toggle('menu-open');
                
                console.log('📱 Menu toggled:', sidebar.classList.contains('active') ? 'open' : 'closed');
            });
            
            // Close on outside click
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 768 && 
                    sidebar.classList.contains('active') && 
                    !sidebar.contains(e.target) && 
                    !mobileToggle.contains(e.target)) {
                    
                    mobileToggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                    
                    console.log('📱 Menu closed by outside click');
                }
            });
            
            // Close on escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && sidebar.classList.contains('active')) {
                    mobileToggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                    
                    console.log('📱 Menu closed by escape key');
                }
            });
            
            console.log('📱 Mobile menu initialized');
        }

                        <table><thead><tr><th>Student</th><th>Course</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                        <tbody id="recentEnrollmentsTable"><tr><td colspan="5" style="text-align: center;">Loading enrollments...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <div class="quick-action-card" onclick="alert('Create User modal would open')">
                        <div class="quick-action-icon"><i class="fas fa-user-plus"></i></div>
                        <h4 class="quick-action-title">Add User</h4>
                        <p class="quick-action-desc">Create new student account</p>
                    </div>
                    <div class="quick-action-card" onclick="alert('Create Course modal would open')">
                        <div class="quick-action-icon"><i class="fas fa-book"></i></div>
                        <h4 class="quick-action-title">New Course</h4>
                        <p class="quick-action-desc">Create course content</p>
                    </div>
                    <div class="quick-action-card" onclick="alert('Upload Material modal would open')">
                        <div class="quick-action-icon"><i class="fas fa-upload"></i></div>
                        <h4 class="quick-action-title">Upload Material</h4>
                        <p class="quick-action-desc">Share learning resources</p>
                    </div>
                    <div class="quick-action-card" onclick="alert('Create Quiz modal would open')">
                        <div class="quick-action-icon"><i class="fas fa-question-circle"></i></div>
                        <h4 class="quick-action-title">Create Quiz</h4>
                        <p class="quick-action-desc">Assess student progress</p>
                    </div>
                </div>
            `;
        }

        // ===================================================================
        // 🎯 EVENT LISTENERS
        // ===================================================================
        function initEventListeners() {
            // Sidebar toggle (desktop)
            const sidebarToggle = document.getElementById('sidebarToggle');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', toggleSidebar);
            }
            
            // Logout button
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', handleLogout);
            }
            
            // Navigation links
            document.querySelectorAll('.nav-link[data-section]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const section = link.dataset.section;
                    loadSection(section);
                    
                    // Close mobile menu after navigation
                    if (window.innerWidth <= 768) {
                        document.getElementById('mobileMenuToggle')?.classList.remove('active');
                        document.getElementById('sidebar')?.classList.remove('active');
                        document.body.classList.remove('menu-open');
                    }
                });
            });
            
            // Global search
            const searchInput = document.getElementById('globalSearch');
            if (searchInput) {
                searchInput.addEventListener('input', debounce(handleSearch, 500));
            }
            
            // Notification button
            const notificationBtn = document.getElementById('notificationBtn');
            if (notificationBtn) {
                notificationBtn.addEventListener('click', () => {
                    alert('No new notifications');
                });
            }
            
            // Update datetime
            updateDateTime();
            setInterval(updateDateTime, 1000);
        }

        // ===================================================================
        // 🔧 UTILITY FUNCTIONS
        // ===================================================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('mainContent');
            sidebar?.classList.toggle('collapsed');
            main?.classList.toggle('expanded');
        }

        async function handleLogout() {
            try {
                // Clear ALL storage
                localStorage.clear();
                sessionStorage.clear();
                
                // Clear cookies
                document.cookie.split(';').forEach(c => {
                    document.cookie = c.replace(/^ +/, '').replace(/=.*/, '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;');
                });
                
                // Redirect to login
                window.location.href = 'login.html';
                
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = 'login.html';
            }
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function handleSearch(e) {
            const query = e.target.value.trim();
            if (query.length > 2) {
                console.log('Searching for:', query);
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '—';
            
            return date.toLocaleDateString('en-ZM', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });
        }

        function formatCurrency(amount) {
            return `K${amount || 0}`;
        }

        function updateDateTime() {
            const now = new Date();
            const element = document.getElementById('currentDateTime');
            if (element) {
                element.innerHTML = `
                    <i class="fas fa-calendar-alt"></i>
                    ${now.toLocaleDateString('en-ZM', { 
                        weekday: 'short', 
                        day: 'numeric', 
                        month: 'short', 
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    })}
                `;
            }
        }

        function updateElement(id, value) {
            const element = document.getElementById(id);
            if (element) element.textContent = value;
        }

        function showLoading() {
            // Add loading class to stat cards
            document.querySelectorAll('.stat-card .stat-number').forEach(el => {
                el.style.opacity = '0.5';
            });
        }

        function hideLoading() {
            document.querySelectorAll('.stat-card .stat-number').forEach(el => {
                el.style.opacity = '1';
            });
        }

        function startAutoRefresh() {
            setInterval(() => {
                if (document.visibilityState === 'visible') {
                    loadStats();
                    loadNotifications();
                }
            }, 30000);
        }

        // ===================================================================
        // 📤 GLOBAL FUNCTIONS (Placeholders)
        // ===================================================================
        window.loadSection = loadSection;
        window.viewUser = (id) => alert(`View user: ${id}`);
        window.editUser = (id) => alert(`Edit user: ${id}`);
        window.viewEnrollment = (id) => alert(`View enrollment: ${id}`);
        window.viewProof = (url) => window.open(url);
        window.updateEnrollmentStatus = (id) => alert(`Update enrollment status: ${id}`);
        window.showCreateUserModal = () => alert('Create User modal would open');
        window.showCreateCourseModal = () => alert('Create Course modal would open');
        window.showUploadMaterialModal = () => alert('Upload Material modal would open');
        window.showCreateQuizModal = () => alert('Create Quiz modal would open');
        window.toggleSidebar = toggleSidebar;
    </script>
</body>
</html>
