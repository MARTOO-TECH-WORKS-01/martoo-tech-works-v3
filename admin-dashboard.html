<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Martoo Tech Works - Administrator Dashboard. Manage users, courses, enrollments, and platform content.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Martoo Tech Works">
    
    <title>Admin Dashboard - Martoo Tech Works</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Images/martoo_tech_logo.png">
    
    <style>
        /* ===== DASHBOARD SPECIFIC STYLES ===== */
        :root {
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 80px;
            --header-height: 70px;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: var(--primary-deeper);
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .dashboard-sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary-deeper) 100%);
            border-right: 1px solid rgba(0, 123, 255, 0.1);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: width var(--transition-normal);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .dashboard-sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo img {
            height: 40px;
            width: auto;
        }

        .sidebar-logo span {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--neutral-100);
            letter-spacing: 1px;
        }

        .sidebar-logo .tech {
            color: var(--accent-blue);
        }

        .sidebar-toggle {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: var(--primary-navy);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--neutral-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .sidebar-toggle:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* Admin Profile */
        .admin-profile {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-avatar {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-full);
            background: var(--gradient-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .admin-info {
            flex: 1;
            overflow: hidden;
        }

        .admin-name {
            font-weight: 700;
            color: var(--neutral-100);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .admin-role {
            font-size: 12px;
            color: var(--accent-blue);
            background: rgba(0, 123, 255, 0.1);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            display: inline-block;
        }

        /* Navigation Menu */
        .sidebar-nav {
            flex: 1;
            padding: 24px 16px;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            padding: 0 12px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neutral-400);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-items {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--neutral-300);
            transition: all var(--transition-fast);
            position: relative;
        }

        .nav-link i {
            width: 20px;
            font-size: 18px;
            text-align: center;
        }

        .nav-link:hover {
            background: rgba(0, 123, 255, 0.1);
            color: var(--accent-blue);
        }

        .nav-link.active {
            background: var(--accent-blue);
            color: white;
        }

        .nav-link.active i {
            color: white;
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }

        .nav-link.active .nav-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 24px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            width: 100%;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            border-radius: var(--radius-md);
            color: #ff6b7b;
            font-weight: 600;
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.3);
            color: #ff8a9a;
        }

        .logout-btn i {
            font-size: 18px;
        }

        /* ===== MAIN CONTENT ===== */
        .dashboard-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left var(--transition-normal);
            min-height: 100vh;
            background: var(--primary-deeper);
            position: relative;
        }

        .dashboard-main.expanded {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* Top Header */
        .dashboard-header {
            height: var(--header-height);
            background: var(--gradient-card);
            border-bottom: 1px solid rgba(0, 123, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .header-search {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .header-search i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-400);
            font-size: 16px;
        }

        .header-search input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            color: var(--neutral-100);
            font-size: 14px;
            transition: all var(--transition-fast);
        }

        .header-search input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--primary-midnight);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-notification {
            position: relative;
        }

        .notification-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--neutral-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }

        .notification-btn:hover {
            background: var(--primary-navy);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: var(--danger);
            color: white;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary-dark);
        }

        .header-date {
            color: var(--neutral-300);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--primary-deep);
            border-radius: var(--radius-full);
        }

        .header-date i {
            color: var(--accent-blue);
        }

        /* ===== DASHBOARD CONTENT ===== */
        .dashboard-content {
            padding: 32px;
        }

        /* Welcome Banner */
        .welcome-banner {
            background: var(--gradient-navy);
            border: 1px solid rgba(0, 123, 255, 0.2);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .welcome-content h2 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--neutral-100);
        }

        .welcome-content p {
            color: var(--neutral-300);
            margin-bottom: 0;
            font-size: 16px;
        }

        .welcome-stats {
            display: flex;
            gap: 32px;
        }

        .welcome-stat {
            text-align: center;
        }

        .welcome-stat .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .welcome-stat .stat-label {
            font-size: 13px;
            color: var(--neutral-400);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--gradient-card);
            border: 1px solid rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            transition: all var(--transition-normal);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 123, 255, 0.3);
            box-shadow: var(--shadow-lg);
        }

        .stat-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-400);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--neutral-100);
            margin-bottom: 4px;
            line-height: 1;
        }

        .stat-trend {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-trend.positive {
            color: var(--success);
        }

        .stat-trend.negative {
            color: var(--danger);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-blue);
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .chart-header h3 {
            font-size: 18px;
            margin-bottom: 0;
            color: var(--neutral-100);
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            padding: 6px 12px;
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            color: var(--neutral-300);
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .chart-btn:hover,
        .chart-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        /* Tables */
        .table-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .table-header h3 {
            font-size: 18px;
            margin-bottom: 0;
            color: var(--neutral-100);
        }

        .table-actions {
            display: flex;
            gap: 12px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--neutral-400);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px;
            color: var(--neutral-200);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(0, 123, 255, 0.02);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--primary-navy);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-weight: 700;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: var(--neutral-100);
            margin-bottom: 2px;
        }

        .user-email {
            font-size: 12px;
            color: var(--neutral-400);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .status-confirmed {
            background: rgba(0, 123, 255, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(0, 123, 255, 0.2);
        }

        .status-cancelled {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
            border: 1px solid rgba(220, 53, 69, 0.2);
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--neutral-300);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .action-btn:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .action-btn.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .quick-action-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .quick-action-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            background: linear-gradient(145deg, var(--primary-navy) 0%, var(--primary-midnight) 100%);
        }

        .quick-action-icon {
            width: 70px;
            height: 70px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-blue);
            margin: 0 auto 16px;
            transition: all var(--transition-normal);
        }

        .quick-action-card:hover .quick-action-icon {
            background: var(--accent-blue);
            color: white;
            transform: scale(1.1);
        }

        .quick-action-title {
            font-weight: 700;
            color: var(--neutral-100);
            margin-bottom: 8px;
        }

        .quick-action-desc {
            font-size: 13px;
            color: var(--neutral-400);
            margin-bottom: 0;
        }

        /* Loading States */
        .loading-skeleton {
            background: linear-gradient(90deg, 
                var(--primary-navy) 25%, 
                var(--primary-midnight) 50%, 
                var(--primary-navy) 75%
            );
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== MOBILE HAMBURGER MENU STYLES ===== */
        @media (max-width: 768px) {
            .dashboard-sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
                transition: transform 0.3s ease;
            }
            
            .dashboard-sidebar.active {
                transform: translateX(0);
            }
            
            .dashboard-main {
                margin-left: 0 !important;
            }
            
            .mobile-menu-toggle {
                display: flex !important;
                flex-direction: column;
                justify-content: space-between;
                width: 30px;
                height: 21px;
                background: transparent;
                border: none;
                cursor: pointer;
                padding: 0;
                margin-right: 16px;
                z-index: 1001;
            }
            
            .mobile-menu-toggle span {
                width: 100%;
                height: 3px;
                background: var(--neutral-100);
                transition: all 0.3s ease;
                border-radius: 3px;
            }
            
            .mobile-menu-toggle.active span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }
            
            .mobile-menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }
            
            .mobile-menu-toggle.active span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }
            
            body.menu-open {
                overflow: hidden;
            }
            
            .header-actions {
                gap: 8px;
            }
            
            .header-date span {
                display: none;
            }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 992px) {
            .welcome-banner {
                flex-direction: column;
                text-align: center;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-content {
                padding: 24px 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                grid-template-columns: 1fr;
            }
            
            .welcome-stats {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- ============================================ -->
        <!-- 🛡️ SIDEBAR - ADMIN NAVIGATION              -->
        <!-- ============================================ -->
        <aside class="dashboard-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="Images/martoo_tech_logo.png" alt="Martoo Tech Works">
                    <span>MARTOO<span class="tech">TECH</span></span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <div class="admin-profile" id="adminProfile">
                <div class="admin-avatar">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="admin-info">
                    <div class="admin-name" id="adminName">Loading...</div>
                    <span class="admin-role">Administrator</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <!-- Main Navigation -->
                <div class="nav-section">
                    <div class="nav-section-title">MAIN</div>
                    <ul class="nav-items">
                        <li class="nav-item">
                            <a href="#dashboard" class="nav-link active" data-section="dashboard">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#users" class="nav-link" data-section="users">
                                <i class="fas fa-users"></i>
                                <span>Users</span>
                                <span class="nav-badge" id="userCountBadge">0</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#enrollments" class="nav-link" data-section="enrollments">
                                <i class="fas fa-graduation-cap"></i>
                                <span>Enrollments</span>
                                <span class="nav-badge" id="enrollmentBadge">0</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#courses" class="nav-link" data-section="courses">
                                <i class="fas fa-book"></i>
                                <span>Courses</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- Content Management -->
                <div class="nav-section">
                    <div class="nav-section-title">CONTENT</div>
                    <ul class="nav-items">
                        <li class="nav-item">
                            <a href="#quizzes" class="nav-link" data-section="quizzes">
                                <i class="fas fa-question-circle"></i>
                                <span>Quizzes</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#assignments" class="nav-link" data-section="assignments">
                                <i class="fas fa-tasks"></i>
                                <span>Assignments</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#materials" class="nav-link" data-section="materials">
                                <i class="fas fa-file-alt"></i>
                                <span>Materials</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#blog" class="nav-link" data-section="blog">
                                <i class="fas fa-blog"></i>
                                <span>Blog Posts</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- System -->
                <div class="nav-section">
                    <div class="nav-section-title">SYSTEM</div>
                    <ul class="nav-items">
                        <li class="nav-item">
                            <a href="#payments" class="nav-link" data-section="payments">
                                <i class="fas fa-credit-card"></i>
                                <span>Payments</span>
                                <span class="nav-badge" id="paymentBadge">0</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#messages" class="nav-link" data-section="messages">
                                <i class="fas fa-envelope"></i>
                                <span>Messages</span>
                                <span class="nav-badge" id="messageBadge">0</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#analytics" class="nav-link" data-section="analytics">
                                <i class="fas fa-chart-bar"></i>
                                <span>Analytics</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#settings" class="nav-link" data-section="settings">
                                <i class="fas fa-cog"></i>
                                <span>Settings</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sign Out</span>
                </button>
            </div>
        </aside>

        <!-- ============================================ -->
        <!-- 📊 MAIN CONTENT AREA                       -->
        <!-- ============================================ -->
        <main class="dashboard-main" id="mainContent">
            <!-- Header -->
            <header class="dashboard-header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <!-- Mobile Hamburger Menu Button -->
                    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Menu" style="display: none;">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                    
                    <div class="header-search">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search users, enrollments, courses..." id="globalSearch">
                    </div>
                </div>

                <div class="header-actions">
                    <div class="header-notification">
                        <button class="notification-btn" id="notificationBtn">
                            <i class="fas fa-bell"></i>
                            <span class="notification-badge" id="notificationBadge">0</span>
                        </button>
                    </div>
                    <div class="header-date">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="currentDateTime"></span>
                    </div>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div class="dashboard-content" id="dashboardContent">
                <!-- Content loaded dynamically via JavaScript -->
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    
    <script>
        /**
         * ===================================================================
         * ADMIN DASHBOARD - COMPLETE FIXED VERSION
         * ===================================================================
         */

        'use strict';

        // ===================================================================
        // 🔐 AUTHENTICATION CHECK - FIXED
        // ===================================================================
        (function() {
            console.log('🔍 Admin dashboard checking authentication...');
            
            // Check ALL storage locations
            const token = localStorage.getItem('martoo_token') || sessionStorage.getItem('martoo_token');
            const userJson = localStorage.getItem('martoo_user') || sessionStorage.getItem('martoo_user');
            
            console.log('📦 Token exists:', !!token);
            console.log('📦 User data exists:', !!userJson);
            
            if (!token || !userJson) {
                console.log('❌ No authentication found - redirecting to login');
                window.location.replace('login.html');
                return;
            }
            
            try {
                const user = JSON.parse(userJson);
                console.log('👤 User:', user.email, 'Role:', user.role);
                
                if (user.role !== 'admin') {
                    console.log('❌ Not admin - redirecting to user dashboard');
                    window.location.replace('user_dashboard.html');
                    return;
                }
                
                // Set admin name
                const adminNameEl = document.getElementById('adminName');
                if (adminNameEl) {
                    adminNameEl.textContent = user.name || 'Administrator';
                }
                
                console.log('✅ Authentication successful');
                
                // Start dashboard
                if (typeof initDashboard === 'function') {
                    initDashboard();
                } else {
                    console.error('❌ initDashboard not found');
                }
                
            } catch (error) {
                console.error('❌ Error parsing user data:', error);
                window.location.replace('login.html');
            }
        })();

        // ===================================================================
        // 🚀 DASHBOARD INITIALIZATION
        // ===================================================================
        async function initDashboard() {
            try {
                console.log('🚀 Initializing dashboard...');
                
                // Show loading state
                showLoading();
                
                // Load dashboard sections
                await Promise.allSettled([
                    loadStats(),
                    loadRecentUsers(),
                    loadRecentEnrollments(),
                    loadNotifications()
                ]);
                
                // Initialize charts
                initializeCharts();
                
                // Load default section
                loadSection('dashboard');
                
                // Hide loading
                hideLoading();
                
                // Initialize event listeners
                initEventListeners();
                
                // Initialize mobile menu
                initMobileMenu();
                
                // Start auto-refresh
                startAutoRefresh();
                
                console.log('✅ Dashboard initialized successfully');
                
            } catch (error) {
                console.error('❌ Dashboard initialization failed:', error);
                // Don't redirect, just show error
                const content = document.getElementById('dashboardContent');
                if (content) {
                    content.innerHTML = `
                        <div style="text-align: center; padding: 100px 20px;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: var(--danger); margin-bottom: 20px;"></i>
                            <h2>Failed to load dashboard</h2>
                            <p style="color: var(--neutral-300);">Please refresh the page or try again later.</p>
                        </div>
                    `;
                }
            }
        }

        // ===================================================================
        // 📱 MOBILE MENU
        // ===================================================================
        function initMobileMenu() {
            const mobileToggle = document.getElementById('mobileMenuToggle');
            const sidebar = document.getElementById('sidebar');
            
            if (!mobileToggle || !sidebar) return;
            
            function updateVisibility() {
                if (window.innerWidth <= 768) {
                    mobileToggle.style.display = 'flex';
                } else {
                    mobileToggle.style.display = 'none';
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }
            }
            
            updateVisibility();
            window.addEventListener('resize', updateVisibility);
            
            mobileToggle.addEventListener('click', (e) => {
                e.preventDefault();
                mobileToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                document.body.classList.toggle('menu-open');
            });
            
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && sidebar.classList.contains('active') && 
                    !sidebar.contains(e.target) && !mobileToggle.contains(e.target)) {
                    mobileToggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebar.classList.contains('active')) {
                    mobileToggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }
            });
        }

        // ===================================================================
        // 📊 STATISTICS
        // ===================================================================
        async function loadStats() {
            try {
                let stats = { totalUsers: 0, totalEnrollments: 0, pendingPayments: 0, confirmedEnrollments: 0 };
                
                if (window.API?.admin?.getStats) {
                    const response = await window.API.admin.getStats();
                    if (response.success) {
                        stats = response.data.stats || stats;
                    }
                }
                
                updateElement('totalUsersStat', stats.totalUsers || 0);
                updateElement('totalEnrollmentsStat', stats.totalEnrollments || 0);
                updateElement('pendingPaymentsStat', stats.pendingPayments || 0);
                updateElement('confirmedEnrollmentsStat', stats.confirmedEnrollments || 0);
                updateElement('userCountBadge', stats.totalUsers || 0);
                updateElement('enrollmentBadge', stats.pendingPayments || 0);
                updateElement('paymentBadge', stats.pendingPayments || 0);
                updateElement('welcomeEnrollments', stats.totalEnrollments || 0);
                updateElement('welcomeUsers', stats.totalUsers || 0);
                
                return stats;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // ===================================================================
        // 📈 CHARTS
        // ===================================================================
        function initializeCharts() {
            if (typeof Chart === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js';
                script.onload = createCharts;
                document.head.appendChild(script);
            } else {
                createCharts();
            }
        }

        function createCharts() {
            createEnrollmentChart();
            createRevenueChart();
        }

        function createEnrollmentChart() {
            const canvas = document.getElementById('enrollmentChart');
            if (!canvas) return;
            new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Enrollments',
                        data: [12, 19, 15, 25, 22, 30],
                        borderColor: '#007BFF',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function createRevenueChart() {
            const canvas = document.getElementById('revenueChart');
            if (!canvas) return;
            new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['STATA', 'GIS', 'Research', 'Academic'],
                    datasets: [{
                        data: [45, 25, 20, 10],
                        backgroundColor: ['#007BFF', '#28A745', '#FFC107', '#17A2B8'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    cutout: '70%'
                }
            });
        }

        // ===================================================================
        // 👥 USERS
        // ===================================================================
        async function loadRecentUsers() {
            const tbody = document.getElementById('recentUsersTable');
            if (!tbody) return;
            
            try {
                let users = [];
                if (window.API?.users?.getAllUsers) {
                    const response = await window.API.users.getAllUsers({ limit: 5 });
                    if (response.success) users = response.data.users || [];
                }
                
                if (users.length === 0) {
                    users = [
                        { id: 1, name: 'John Mulenga', email: 'john@example.com', course: 'STATA', status: 'active', createdAt: new Date().toISOString() },
                        { id: 2, name: 'Mary Banda', email: 'mary@example.com', course: 'GIS', status: 'active', createdAt: new Date().toISOString() }
                    ];
                }
                
                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>
                            <div class="user-info">
                                <div class="user-avatar">${user.name?.charAt(0).toUpperCase() || '?'}</div>
                                <div class="user-details">
                                    <span class="user-name">${user.name || 'Unknown'}</span>
                                    <span class="user-email">${user.email || ''}</span>
                                </div>
                            </div>
                        </td>
                        <td>${user.course || '—'}</td>
                        <td><span class="status-badge status-${user.status || 'active'}">${user.status || 'Active'}</span></td>
                        <td>${formatDate(user.createdAt)}</td>
                        <td>
                            <button class="action-btn" onclick="alert('View user: ${user.id}')"><i class="fas fa-eye"></i></button>
                            <button class="action-btn" onclick="alert('Edit user: ${user.id}')"><i class="fas fa-edit"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load users:', error);
            }
        }

        // ===================================================================
        // 📝 ENROLLMENTS
        // ===================================================================
        async function loadRecentEnrollments() {
            const tbody = document.getElementById('recentEnrollmentsTable');
            if (!tbody) return;
            
            try {
                let enrollments = [];
                if (window.API?.enrollments?.getAllEnrollments) {
                    const response = await window.API.enrollments.getAllEnrollments({ limit: 5 });
                    if (response.success) enrollments = response.data.enrollments || [];
                }
                
                if (enrollments.length === 0) {
                    enrollments = [
                        { id: 1, name: 'John Mulenga', course: 'STATA', status: 'Pending', createdAt: new Date().toISOString() },
                        { id: 2, name: 'Mary Banda', course: 'GIS', status: 'Confirmed', createdAt: new Date().toISOString() }
                    ];
                }
                
                tbody.innerHTML = enrollments.map(enrollment => `
                    <tr>
                        <td>${enrollment.name}</td>
                        <td>${enrollment.course}</td>
                        <td><span class="status-badge status-${enrollment.status?.toLowerCase() === 'confirmed' ? 'confirmed' : 'pending'}">${enrollment.status || 'Pending'}</span></td>
                        <td>${formatDate(enrollment.createdAt)}</td>
                        <td>
                            <button class="action-btn" onclick="alert('View enrollment: ${enrollment.id}')"><i class="fas fa-eye"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load enrollments:', error);
            }
        }

        // ===================================================================
        // 🔔 NOTIFICATIONS
        // ===================================================================
        async function loadNotifications() {
            try {
                document.getElementById('notificationBadge').textContent = '3';
                document.getElementById('messageBadge').textContent = '3';
            } catch (error) {
                console.error('Failed to load notifications:', error);
            }
        }

        // ===================================================================
        // 🧭 SECTION LOADER
        // ===================================================================
        async function loadSection(section) {
            const content = document.getElementById('dashboardContent');
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.querySelector(`[data-section="${section}"]`)?.classList.add('active');
            
            if (section === 'dashboard') {
                content.innerHTML = getDashboardHTML();
                await Promise.all([loadStats(), loadRecentUsers(), loadRecentEnrollments()]);
                setTimeout(createCharts, 100);
            } else {
                content.innerHTML = `<div style="text-align: center; padding: 100px 20px;">
                    <i class="fas fa-tools" style="font-size: 64px; color: var(--accent-blue);"></i>
                    <h2>${section.charAt(0).toUpperCase() + section.slice(1)}</h2>
                    <p>Coming soon...</p>
                </div>`;
            }
        }

        // ===================================================================
        // 🏠 DASHBOARD HTML
        // ===================================================================
        function getDashboardHTML() {
            return `
                <div class="welcome-banner">
                    <div class="welcome-content">
                        <h2>Welcome back, Administrator!</h2>
                        <p>Here's what's happening today.</p>
                    </div>
                    <div class="welcome-stats">
                        <div class="welcome-stat"><div class="stat-value" id="welcomeEnrollments">0</div><div class="stat-label">Enrollments</div></div>
                        <div class="welcome-stat"><div class="stat-value" id="welcomeUsers">0</div><div class="stat-label">Users</div></div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h4>Total Users</h4><div class="stat-number" id="totalUsersStat">0</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h4>Enrollments</h4><div class="stat-number" id="totalEnrollmentsStat">0</div></div><div class="stat-icon"><i class="fas fa-graduation-cap"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h4>Pending</h4><div class="stat-number" id="pendingPaymentsStat">0</div></div><div class="stat-icon"><i class="fas fa-clock"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h4>Confirmed</h4><div class="stat-number" id="confirmedEnrollmentsStat">0</div></div><div class="stat-icon"><i class="fas fa-check-circle"></i></div></div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card"><div class="chart-header"><h3>Enrollment Trends</h3></div><div class="chart-container"><canvas id="enrollmentChart"></canvas></div></div>
                    <div class="chart-card"><div class="chart-header"><h3>Revenue by Service</h3></div><div class="chart-container"><canvas id="revenueChart"></canvas></div></div>
                </div>

                <div class="table-card">
                    <div class="table-header"><h3>Recent Users</h3><button class="btn btn-outline-primary btn-sm" onclick="loadSection('users')">View All</button></div>
                    <div class="table-container"><table><thead><tr><th>User</th><th>Course</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead><tbody id="recentUsersTable"></tbody></table></div>
                </div>

                <div class="table-card">
                    <div class="table-header"><h3>Recent Enrollments</h3><button class="btn btn-outline-primary btn-sm" onclick="loadSection('enrollments')">View All</button></div>
                    <div class="table-container"><table><thead><tr><th>Student</th><th>Course</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody id="recentEnrollmentsTable"></tbody></table></div>
                </div>

                <div class="quick-actions">
                    <div class="quick-action-card" onclick="alert('Add User')"><div class="quick-action-icon"><i class="fas fa-user-plus"></i></div><h4>Add User</h4></div>
                    <div class="quick-action-card" onclick="alert('Add Course')"><div class="quick-action-icon"><i class="fas fa-book"></i></div><h4>New Course</h4></div>
                    <div class="quick-action-card" onclick="alert('Upload')"><div class="quick-action-icon"><i class="fas fa-upload"></i></div><h4>Upload</h4></div>
                    <div class="quick-action-card" onclick="alert('Create Quiz')"><div class="quick-action-icon"><i class="fas fa-question-circle"></i></div><h4>Create Quiz</h4></div>
                </div>
            `;
        }

        // ===================================================================
        // 🎯 EVENT LISTENERS
        // ===================================================================
        function initEventListeners() {
            document.getElementById('sidebarToggle')?.addEventListener('click', toggleSidebar);
            
            document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
            
            document.querySelectorAll('.nav-link[data-section]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadSection(link.dataset.section);
                });
            });
            
            document.getElementById('globalSearch')?.addEventListener('input', debounce(handleSearch, 500));
            
            document.getElementById('notificationBtn')?.addEventListener('click', () => alert('No new notifications'));
            
            updateDateTime();
            setInterval(updateDateTime, 1000);
        }

        // ===================================================================
        // 🔧 UTILITIES
        // ===================================================================
        function toggleSidebar() {
            document.getElementById('sidebar')?.classList.toggle('collapsed');
            document.getElementById('mainContent')?.classList.toggle('expanded');
        }

        async function handleLogout() {
            if (window.Auth) {
                window.Auth.logout(true);
            } else {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }

        function debounce(func, wait) {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        function handleSearch(e) {
            if (e.target.value.length > 2) console.log('Searching:', e.target.value);
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            return isNaN(date.getTime()) ? '—' : date.toLocaleDateString('en-ZM', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function updateElement(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        function updateDateTime() {
            const el = document.getElementById('currentDateTime');
            if (el) {
                el.innerHTML = `<i class="fas fa-calendar-alt"></i> ${new Date().toLocaleDateString('en-ZM', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`;
            }
        }

        function showLoading() {
            document.querySelectorAll('.stat-card .stat-number').forEach(el => el.style.opacity = '0.5');
        }

        function hideLoading() {
            document.querySelectorAll('.stat-card .stat-number').forEach(el => el.style.opacity = '1');
        }

        function startAutoRefresh() {
            setInterval(() => {
                if (document.visibilityState === 'visible') {
                    loadStats();
                    loadNotifications();
                }
            }, 30000);
        }

        // Global functions
        window.loadSection = loadSection;
    </script>
</body>
</html>
