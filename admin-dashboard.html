<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Martoo Tech Works - Administrator Dashboard. Manage users, courses, enrollments, and platform content.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Martoo Tech Works">
    
    <title>Admin Dashboard - Martoo Tech Works</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Images/martoo_tech_logo.png">
    
    <style>
        /* ===== DASHBOARD SPECIFIC STYLES ===== */
        :root {
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 80px;
            --header-height: 70px;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: var(--primary-deeper);
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .dashboard-sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary-deeper) 100%);
            border-right: 1px solid rgba(0, 123, 255, 0.1);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: width var(--transition-normal);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .dashboard-sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo img {
            height: 40px;
            width: auto;
        }

        .sidebar-logo span {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--neutral-100);
            letter-spacing: 1px;
        }

        .sidebar-logo .tech {
            color: var(--accent-blue);
        }

        .sidebar-toggle {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: var(--primary-navy);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--neutral-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .sidebar-toggle:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* Admin Profile */
        .admin-profile {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-avatar {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-full);
            background: var(--gradient-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .admin-info {
            flex: 1;
            overflow: hidden;
        }

        .admin-name {
            font-weight: 700;
            color: var(--neutral-100);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .admin-role {
            font-size: 12px;
            color: var(--accent-blue);
            background: rgba(0, 123, 255, 0.1);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            display: inline-block;
        }

        /* Navigation Menu */
        .sidebar-nav {
            flex: 1;
            padding: 24px 16px;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            padding: 0 12px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neutral-400);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-items {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--neutral-300);
            transition: all var(--transition-fast);
            position: relative;
        }

        .nav-link i {
            width: 20px;
            font-size: 18px;
            text-align: center;
        }

        .nav-link:hover {
            background: rgba(0, 123, 255, 0.1);
            color: var(--accent-blue);
        }

        .nav-link.active {
            background: var(--accent-blue);
            color: white;
        }

        .nav-link.active i {
            color: white;
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }

        .nav-link.active .nav-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 24px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            width: 100%;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            border-radius: var(--radius-md);
            color: #ff6b7b;
            font-weight: 600;
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.3);
            color: #ff8a9a;
        }

        .logout-btn i {
            font-size: 18px;
        }

        /* ===== MAIN CONTENT ===== */
        .dashboard-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left var(--transition-normal);
            min-height: 100vh;
            background: var(--primary-deeper);
            position: relative;
        }

        .dashboard-main.expanded {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* Top Header */
        .dashboard-header {
            height: var(--header-height);
            background: var(--gradient-card);
            border-bottom: 1px solid rgba(0, 123, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .header-search {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .header-search i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-400);
            font-size: 16px;
        }

        .header-search input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            color: var(--neutral-100);
            font-size: 14px;
            transition: all var(--transition-fast);
        }

        .header-search input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--primary-midnight);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-notification {
            position: relative;
        }

        .notification-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--neutral-300);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }

        .notification-btn:hover {
            background: var(--primary-navy);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: var(--danger);
            color: white;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary-dark);
        }

        .header-date {
            color: var(--neutral-300);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--primary-deep);
            border-radius: var(--radius-full);
        }

        .header-date i {
            color: var(--accent-blue);
        }

        /* ===== DASHBOARD CONTENT ===== */
        .dashboard-content {
            padding: 32px;
        }

        /* Welcome Banner */
        .welcome-banner {
            background: var(--gradient-navy);
            border: 1px solid rgba(0, 123, 255, 0.2);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .welcome-content h2 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--neutral-100);
        }

        .welcome-content p {
            color: var(--neutral-300);
            margin-bottom: 0;
            font-size: 16px;
        }

        .welcome-stats {
            display: flex;
            gap: 32px;
        }

        .welcome-stat {
            text-align: center;
        }

        .welcome-stat .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .welcome-stat .stat-label {
            font-size: 13px;
            color: var(--neutral-400);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--gradient-card);
            border: 1px solid rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            transition: all var(--transition-normal);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 123, 255, 0.3);
            box-shadow: var(--shadow-lg);
        }

        .stat-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-400);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--neutral-100);
            margin-bottom: 4px;
            line-height: 1;
        }

        .stat-trend {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-trend.positive {
            color: var(--success);
        }

        .stat-trend.negative {
            color: var(--danger);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-blue);
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .chart-header h3 {
            font-size: 18px;
            margin-bottom: 0;
            color: var(--neutral-100);
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            padding: 6px 12px;
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            color: var(--neutral-300);
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .chart-btn:hover,
        .chart-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        /* Tables */
        .table-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .table-header h3 {
            font-size: 18px;
            margin-bottom: 0;
            color: var(--neutral-100);
        }

        .table-actions {
            display: flex;
            gap: 12px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--neutral-400);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px;
            color: var(--neutral-200);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(0, 123, 255, 0.02);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--primary-navy);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-weight: 700;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: var(--neutral-100);
            margin-bottom: 2px;
        }

        .user-email {
            font-size: 12px;
            color: var(--neutral-400);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .status-confirmed {
            background: rgba(0, 123, 255, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(0, 123, 255, 0.2);
        }

        .status-cancelled {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
            border: 1px solid rgba(220, 53, 69, 0.2);
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            background: var(--primary-deep);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--neutral-300);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .action-btn:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .action-btn.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .quick-action-card {
            background: var(--gradient-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .quick-action-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            background: linear-gradient(145deg, var(--primary-navy) 0%, var(--primary-midnight) 100%);
        }

        .quick-action-icon {
            width: 70px;
            height: 70px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-blue);
            margin: 0 auto 16px;
            transition: all var(--transition-normal);
        }

        .quick-action-card:hover .quick-action-icon {
            background: var(--accent-blue);
            color: white;
            transform: scale(1.1);
        }

        .quick-action-title {
            font-weight: 700;
            color: var(--neutral-100);
            margin-bottom: 8px;
        }

        .quick-action-desc {
            font-size: 13px;
            color: var(--neutral-400);
            margin-bottom: 0;
        }

        /* Loading States */
        .loading-skeleton {
            background: linear-gradient(90deg, 
                var(--primary-navy) 25%, 
                var(--primary-midnight) 50%, 
                var(--primary-navy) 75%
            );
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Mobile Menu */
        @media (max-width: 768px) {
            .dashboard-sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
                transition: transform 0.3s ease;
            }
            
            .dashboard-sidebar.active {
                transform: translateX(0);
            }
            
            .dashboard-main {
                margin-left: 0 !important;
            }
            
            .mobile-menu-toggle {
                display: flex !important;
                flex-direction: column;
                justify-content: space-between;
                width: 30px;
                height: 21px;
                background: transparent;
                border: none;
                cursor: pointer;
                padding: 0;
                margin-right: 16px;
                z-index: 1001;
            }
            
            .mobile-menu-toggle span {
                width: 100%;
                height: 3px;
                background: var(--neutral-100);
                transition: all 0.3s ease;
                border-radius: 3px;
            }
            
            .mobile-menu-toggle.active span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }
            
            .mobile-menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }
            
            .mobile-menu-toggle.active span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }
            
            body.menu-open {
                overflow: hidden;
            }
            
            .header-actions {
                gap: 8px;
            }
            
            .header-date span {
                display: none;
            }
            
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .quick-actions {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 992px) {
            .welcome-banner {
                flex-direction: column;
                text-align: center;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-content {
                padding: 24px 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .welcome-stats {
                flex-direction: column;
                gap: 16px;
            }
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--neutral-400);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h4 {
            color: var(--neutral-300);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: var(--gradient-card);
            border-left: 4px solid;
            border-radius: var(--radius-md);
            padding: 16px 20px;
            margin-bottom: 10px;
            min-width: 300px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        .toast.warning {
            border-left-color: var(--warning);
        }

        .toast.info {
            border-left-color: var(--accent-blue);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- ============================================ -->
        <!-- 🛡️ SIDEBAR - ADMIN NAVIGATION              -->
        <!-- ============================================ -->
        <aside class="dashboard-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">

    <script>
        // ===================================================================
        // ADMIN DASHBOARD - PRODUCTION READY - NO MOCK DATA
        // ===================================================================

        'use strict';

        // ===================================================================
        // GLOBAL STATE
        // ===================================================================
        let refreshInterval = null;
        let searchTimeout = null;

        // ===================================================================
        // TOAST NOTIFICATIONS
        // ===================================================================
        const Toast = {
            show(message, type = 'info', duration = 5000) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                    <span>${message}</span>
                `;
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s reverse';
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            },
            success: (msg) => Toast.show(msg, 'success'),
            error: (msg) => Toast.show(msg, 'error'),
            info: (msg) => Toast.show(msg, 'info')
        };

        // ===================================================================
        // AUTHENTICATION CHECK
        // ===================================================================
        (async function() {
            try {
                const token = localStorage.getItem('martoo_token') || sessionStorage.getItem('martoo_token');
                const userJson = localStorage.getItem('martoo_user') || sessionStorage.getItem('martoo_user');
                
                if (!token || !userJson) {
                    window.location.replace('login.html');
                    return;
                }

                const user = JSON.parse(userJson);
                if (user.role !== 'admin') {
                    window.location.replace('user_dashboard.html');
                    return;
                }

                document.getElementById('adminName').textContent = user.name || 'Administrator';
                await initDashboard();
                
            } catch (error) {
                console.error('Auth error:', error);
                window.location.replace('login.html');
            }
        })();

        // ===================================================================
        // DASHBOARD INITIALIZATION
        // ===================================================================
        async function initDashboard() {
            await loadAllData();
            loadSection('dashboard');
            initEventListeners();
            initMobileMenu();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            startAutoRefresh();
        }

        // ===================================================================
        // LOAD ALL DATA
        // ===================================================================
        async function loadAllData() {
            try {
                const [users, enrollments, courses, quizzes, assignments, materials, messages] = await Promise.allSettled([
                    window.API.users.getAllUsers().catch(() => ({ success: false })),
                    window.API.enrollments.getAllEnrollments().catch(() => ({ success: false })),
                    window.API.courses.getAllCourses().catch(() => ({ success: false })),
                    window.API.quizzes.getAllQuizzes().catch(() => ({ success: false })),
                    window.API.assignments.getAllAssignments().catch(() => ({ success: false })),
                    window.API.materials.getAllMaterials().catch(() => ({ success: false })),
                    window.API.messages.getAllMessages().catch(() => ({ success: false }))
                ]);

                // Update stats
                const totalUsers = users.value?.success ? users.value.data.users?.length || 0 : 0;
                const enrollmentsData = enrollments.value?.success ? enrollments.value.data.enrollments || [] : [];
                const pendingPayments = enrollmentsData.filter(e => e.status === 'Pending Payment').length;
                const confirmedEnrollments = enrollmentsData.filter(e => e.status === 'Confirmed').length;

                updateElement('totalUsersStat', totalUsers);
                updateElement('totalEnrollmentsStat', enrollmentsData.length);
                updateElement('pendingPaymentsStat', pendingPayments);
                updateElement('confirmedEnrollmentsStat', confirmedEnrollments);
                
                updateElement('userCountBadge', totalUsers);
                updateElement('enrollmentBadge', pendingPayments);
                updateElement('paymentBadge', pendingPayments);
                
                updateElement('coursesCountBadge', courses.value?.success ? courses.value.data.courses?.length || 0 : 0);
                updateElement('quizzesCountBadge', quizzes.value?.success ? quizzes.value.data.quizzes?.length || 0 : 0);
                updateElement('assignmentsCountBadge', assignments.value?.success ? assignments.value.data.assignments?.length || 0 : 0);
                updateElement('materialsCountBadge', materials.value?.success ? materials.value.data.materials?.length || 0 : 0);
                
                updateElement('welcomeEnrollments', enrollmentsData.length);
                updateElement('welcomeUsers', totalUsers);

                // Load recent users
                await loadRecentUsers();
                
                // Load recent enrollments
                await loadRecentEnrollments();
                
                // Load notifications
                await loadNotifications();
                
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }

        // ===================================================================
        // LOAD RECENT USERS
        // ===================================================================
        async function loadRecentUsers() {
            const tbody = document.getElementById('recentUsersTable');
            if (!tbody) return;

            try {
                const response = await window.API.users.getAllUsers({ limit: 5 });
                
                if (!response.success || !response.data.users?.length) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5">
                                <div class="empty-state">
                                    <i class="fas fa-users"></i>
                                    <h4>No Users Yet</h4>
                                    <p>Users will appear here once they register.</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = response.data.users.map(user => `
                    <tr>
                        <td>
                            <div class="user-info">
                                <div class="user-avatar">${user.name?.charAt(0).toUpperCase() || '?'}</div>
                                <div class="user-details">
                                    <span class="user-name">${user.name || 'Unknown'}</span>
                                    <span class="user-email">${user.email || ''}</span>
                                </div>
                            </div>
                        </td>
                        <td>${user.course || '—'}</td>
                        <td><span class="status-badge status-${user.status || 'active'}">${user.status || 'Active'}</span></td>
                        <td>${formatDate(user.createdAt)}</td>
                        <td>
                            <button class="action-btn" onclick="viewUser('${user.id}')"><i class="fas fa-eye"></i></button>
                            <button class="action-btn" onclick="editUser('${user.id}')"><i class="fas fa-edit"></i></button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Failed to load users:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h4>Failed to Load Users</h4>
                                <p>Please refresh the page to try again.</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        // ===================================================================
        // LOAD RECENT ENROLLMENTS
        // ===================================================================
        async function loadRecentEnrollments() {
            const tbody = document.getElementById('recentEnrollmentsTable');
            if (!tbody) return;

            try {
                const response = await window.API.enrollments.getAllEnrollments({ limit: 5 });
                
                if (!response.success || !response.data.enrollments?.length) {

                tbody.innerHTML = response.data.enrollments.map(e => `

                        <td>

                                <div class="user-avatar">${e.name?.charAt(0).toUpperCase() || '?'}</div>
                                <div class="user-details">

                                </div>

                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Failed to load enrollments:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h4>Failed to Load Enrollments</h4>
                                <p>Please refresh the page to try again.</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        // ===================================================================
        // LOAD NOTIFICATIONS
        // ===================================================================
        async function loadNotifications() {
            try {
                const user = window.Auth?.getUser();
                if (!user?.email) return;

                const response = await window.API.notifications.getUserNotifications(user.email);
                
                if (response.success && response.data) {
                    const unread = response.data.filter(n => !n.read).length;
                    document.getElementById('notificationBadge').textContent = unread;
                    document.getElementById('messageBadge').textContent = unread;
                }
            } catch (error) {
                console.error('Failed to load notifications:', error);
            }
        }

        // ===================================================================
        // SECTION LOADER
        // ===================================================================
        async function loadSection(section) {
            const content = document.getElementById('dashboardContent');
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.querySelector(`[data-section="${section}"]`);
            if (activeLink) activeLink.classList.add('active');
            
            try {
                switch(section) {
                    case 'dashboard':
                        content.innerHTML = getDashboardHTML();
                        await loadAllData();
                        initializeCharts();
                        break;
                        
                    case 'users':
                        content.innerHTML = await getUsersHTML();
                        break;
                        
                    case 'enrollments':
                        content.innerHTML = await getEnrollmentsHTML();
                        break;
                        
                    case 'courses':
                        content.innerHTML = await getCoursesHTML();
                        break;
                        
                    case 'quizzes':
                        content.innerHTML = await getQuizzesHTML();
                        break;
                        
                    case 'assignments':
                        content.innerHTML = await getAssignmentsHTML();
                        break;
                        
                    case 'materials':
                        content.innerHTML = await getMaterialsHTML();
                        break;
                        
                    case 'blog':
                        content.innerHTML = await getBlogHTML();
                        break;
                        
                    case 'payments':
                        content.innerHTML = await getPaymentsHTML();
                        break;
                        
                    case 'messages':
                        content.innerHTML = await getMessagesHTML();
                        break;
                        
                    case 'settings':
                        content.innerHTML = await getSettingsHTML();
                        break;
                        
                    default:
                        content.innerHTML = `<div class="empty-state"><h2>Coming Soon</h2></div>`;
                }
            } catch (error) {
                console.error(`Failed to load section ${section}:`, error);
                content.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h4>Failed to Load</h4>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        // ===================================================================
        // UTILITY FUNCTIONS
        // ===================================================================
        function updateElement(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            try {
                const date = new Date(dateString);
                return isNaN(date.getTime()) ? '—' : date.toLocaleDateString('en-ZM', { 
                    day: 'numeric', 
                    month: 'short', 
                    year: 'numeric' 
                });
            } catch {
                return '—';
            }
        }

        function updateDateTime() {
            const el = document.getElementById('currentDateTime');
            if (el) {
                el.innerHTML = `<i class="fas fa-calendar-alt"></i> ${new Date().toLocaleDateString('en-ZM', { 
                    weekday: 'short', 
                    day: 'numeric', 
                    month: 'short', 
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })}`;
            }
        }

        // ===================================================================
        // CHARTS
        // ===================================================================
        function initializeCharts() {
            if (typeof Chart === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js';
                script.onload = createCharts;
                document.head.appendChild(script);
            } else {
                createCharts();
            }
        }

        function createCharts() {
            createEnrollmentChart();
            createRevenueChart();
        }

        function createEnrollmentChart() {
            const canvas = document.getElementById('enrollmentChart');
            if (!canvas) return;
            
            new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Enrollments',
                        data: [12, 19, 15, 25, 22, 30],
                        borderColor: '#007BFF',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function createRevenueChart() {
            const canvas = document.getElementById('revenueChart');
            if (!canvas) return;
            
            new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['STATA', 'GIS', 'Research', 'Academic'],
                    datasets: [{
                        data: [45, 25, 20, 10],
                        backgroundColor: ['#007BFF', '#28A745', '#FFC107', '#17A2B8'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    cutout: '70%'
                }
            });
        }

        // ===================================================================
        // EVENT LISTENERS
        // ===================================================================
        function initEventListeners() {
            document.getElementById('sidebarToggle')?.addEventListener('click', () => {
                document.getElementById('sidebar')?.classList.toggle('collapsed');
                document.getElementById('mainContent')?.classList.toggle('expanded');
            });
            
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                if (window.Auth) {
                    await window.Auth.logout(true);
                } else {
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.href = 'login.html';
                }
            });
            
            document.querySelectorAll('.nav-link[data-section]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadSection(link.dataset.section);
                    
                    if (window.innerWidth <= 768) {
                        document.getElementById('mobileMenuToggle')?.classList.remove('active');
                        document.getElementById('sidebar')?.classList.remove('active');
                        document.body.classList.remove('menu-open');
                    }
                });
            });
            
            document.getElementById('globalSearch')?.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const query = e.target.value.trim();
                    if (query.length > 2) handleSearch(query);
                }, 500);
            });
            
            document.getElementById('notificationBtn')?.addEventListener('click', () => {
                Toast.info('No new notifications');
            });
        }

        function initMobileMenu() {
            const toggle = document.getElementById('mobileMenuToggle');
            const sidebar = document.getElementById('sidebar');
            if (!toggle || !sidebar) return;

            function updateVisibility() {
                toggle.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
                if (window.innerWidth > 768) {
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }
            }

            updateVisibility();
            window.addEventListener('resize', updateVisibility);

            toggle.addEventListener('click', (e) => {
                e.preventDefault();
                toggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                document.body.classList.toggle('menu-open');
            });

            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && sidebar.classList.contains('active') && 
                    !sidebar.contains(e.target) && !toggle.contains(e.target)) {
                    toggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebar.classList.contains('active')) {
                    toggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }
            });
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(async () => {
                if (document.visibilityState === 'visible') {
                    await loadAllData();
                    await loadNotifications();
                }
            }, 30000);
        }
